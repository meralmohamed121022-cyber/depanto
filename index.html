<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mo's Secure Journal 🔐</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --dark-blue: #001f3f; --orange: #ff851b; --white: #ffffff;
            --paper: #fdfcf0; --book-spine: #00152b; --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--dark-blue); margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; color: var(--white); overflow-x: hidden;
            direction: ltr;
        }

        /* --- Auth UI --- */
        #auth-container {
            margin-top: 5vh; background: var(--white); padding: 30px;
            border-radius: 20px; box-shadow: 10px 10px 0px var(--orange);
            width: 85%; max-width: 380px; color: #333; text-align: center; border: 3px solid var(--book-spine);
        }
        .auth-tabs { display: flex; margin-bottom: 20px; background: #eee; border-radius: 50px; padding: 4px; }
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; border-radius: 50px; font-weight: bold; font-size: 14px; }
        .auth-tab.active { background: var(--orange); color: white; }
        .auth-input { width: 100%; padding: 14px; margin-bottom: 12px; border: 2px solid #ddd; border-radius: 12px; outline: none; font-size: 16px; display: block; }
        .auth-btn { background: var(--dark-blue); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; }

        /* --- App UI --- */
        #journal-app { display: none; width: 100%; flex-direction: column; align-items: center; }
        .top-bar { width: 92%; display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .avatar-word {
            background: var(--orange); color: white; padding: 8px 18px; border-radius: 30px;
            font-weight: bold; font-size: 15px; border: 2px solid white;
            animation: bounce 2.5s infinite ease-in-out; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .logout-btn { background: none; border: 1px solid white; color: white; padding: 6px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .search-box { width: 90%; max-width: 600px; padding: 12px 20px; border-radius: 50px; border: 2px solid var(--orange); background: var(--glass); color: white; margin: 15px 0; outline: none; }

        .nav-tabs { margin-bottom: 20px; display: flex; gap: 10px; }
        .tab-btn { background: transparent; border: 2px solid var(--orange); color: white; padding: 8px 25px; border-radius: 50px; cursor: pointer; font-size: 14px; }
        .tab-btn.active { background: var(--orange); box-shadow: 0 0 10px var(--orange); }

        /* --- Form UI --- */
        .glass-input {
            background: var(--white); padding: 20px; border-radius: 20px;
            width: 90%; max-width: 600px; box-shadow: 10px 10px 0px var(--orange);
            border: 3px solid var(--book-spine); color: #333; margin-bottom: 30px;
        }
        .glass-input input, .glass-input textarea { width: 100%; border: 1px solid #eee; border-radius: 10px; padding: 12px; margin-bottom: 10px; font-size: 16px; }
        .datetime-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
        .datetime-row div { flex: 1; }
        .today-btn { background: var(--orange); color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .file-upload-art { border: 2px dashed var(--orange); background: #fffbf5; padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; margin-bottom: 10px; font-size: 14px; color: #666; }

        /* --- Journal Grid & Gallery --- */
        .day-header { background: var(--orange); color: white; padding: 8px 25px; border-radius: 0 30px 30px 0; margin: 15px 0; font-weight: bold; align-self: flex-end; margin-right: 5%; }
        .journal-row {
            display: flex; gap: 20px; padding: 15px 20px 35px 20px;
            overflow-x: auto; width: 100%; scroll-snap-type: x mandatory; direction: rtl;
        }
        .journal-row::-webkit-scrollbar { height: 8px; }
        .journal-row::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 10px; }

        .note-card {
            min-width: 290px; max-width: 290px; background: var(--paper); color: #333;
            padding: 20px; border-radius: 5px 20px 20px 5px; box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
            border-right: 12px solid var(--book-spine); scroll-snap-align: center; display: flex; flex-direction: column; position: relative; direction: ltr;
        }
        .card-actions { position: absolute; top: 8px; left: 8px; display: flex; gap: 10px; z-index: 10; }
        .action-btn { border: none; background: rgba(255,255,255,0.8); padding: 5px; border-radius: 5px; cursor: pointer; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* معرض الصور داخل الكارت */
        .media-gallery {
            display: flex; gap: 10px; overflow-x: auto; margin: 12px 0;
            scroll-snap-type: x mandatory; padding-bottom: 5px;
        }
        .media-gallery::-webkit-scrollbar { height: 4px; }
        .gallery-item {
            flex: 0 0 85%; /* يظهر 85% من الصورة و15% من التالية */
            height: 180px; border-radius: 12px; object-fit: cover;
            scroll-snap-align: start; background: #eee; border: 1px solid #ddd;
        }

        /* --- Modal Styling (Final Fix) --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: none; z-index: 99999;
            overflow-y: auto; padding: 40px 0; -webkit-overflow-scrolling: touch;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 20px;
            width: 90%; max-width: 420px; margin: 0 auto; color: #333;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8); position: relative; text-align: center;
        }
        .alert-btns { display: flex; gap: 10px; margin-top: 20px; }
        .alert-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; }

        /* تعديل الميديا في الـ Modal */
        .edit-media-preview {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 15px;
        }
        .preview-wrapper { position: relative; flex: 0 0 100px; height: 100px; }
        .preview-wrapper img, .preview-wrapper video { width: 100%; height: 100%; border-radius: 10px; object-fit: cover; }
        .remove-media-btn {
            position: absolute; top: -5px; right: -5px; background: #ff4444; color: white;
            border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-weight: bold;
        }

        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 100000; }
        #lightbox img, #lightbox video { max-width: 95%; max-height: 85%; border-radius: 5px; border: 2px solid white; }
    </style>
</head>
<body>

<div id="auth-container">
    <h2 id="auth-title">Mo's Vault 🔒</h2>
    <div class="auth-tabs">
        <div id="tab-login" class="auth-tab active" onclick="setMode('login')">Login</div>
        <div id="tab-register" class="auth-tab" onclick="setMode('register')">Register</div>
    </div>
    <input type="text" id="auth-user" class="auth-input" placeholder="Username">
    <input type="password" id="auth-pass" class="auth-input" placeholder="Password">
    <button class="auth-btn" id="auth-btn" onclick="handleAuth()">Enter ✨</button>
</div>

<div id="journal-app">
    <div class="top-bar">
        <div class="user-profile"><div class="avatar-word" id="user-avatar-text">NAME</div></div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <input type="text" id="fuzzySearch" class="search-box" placeholder="Search notes...">

    <div class="nav-tabs">
        <button id="tabActive" class="tab-btn active" onclick="changeView('active')">My Notes</button>
        <button id="tabHistory" class="tab-btn" onclick="changeView('history')">Archive</button>
    </div>

    <div class="glass-input" id="entryForm">
        <input type="text" id="noteTitle" placeholder="Note Title">
        <textarea id="noteText" rows="3" placeholder="What's on your mind?"></textarea>
        <div class="datetime-row">
            <div><label style="font-size:10px;">Date</label><input type="date" id="noteDate"></div>
            <div><label style="font-size:10px;">Time</label><input type="time" id="noteTime"></div>
            <button class="today-btn" onclick="setToday()">Today</button>
        </div>
        <div class="file-upload-art" onclick="document.getElementById('noteFile').click()">
            <span id="fileLabel">Attach Media 🖼️</span>
            <input type="file" id="noteFile" hidden onchange="document.getElementById('fileLabel').innerText='Media Ready ✅'">
        </div>
        <button id="mainSaveBtn" class="auth-btn" onclick="handleSave()">Save Now ✨</button>
    </div>

    <div id="notesLayout" style="width: 100%;"></div>
</div>

<!-- Modal الحذف -->
<div id="confirmModal" class="modal">
    <div class="modal-content">
        <h3 style="color: var(--dark-blue); margin-top:0;">Are you sure? 🗑️</h3>
        <p>This entry will be permanently deleted.</p>
        <div class="alert-btns">
            <button class="alert-btn" style="background: #eee;" onclick="closeConfirm()">Cancel</button>
            <button id="finalDeleteBtn" class="alert-btn" style="background: #ff4444; color: white;">Delete</button>
        </div>
    </div>
</div>

<!-- Modal التنبيهات -->
<div id="alertModal" class="modal">
    <div class="modal-content">
        <h3 id="alertTitle" style="margin-top:0;">Alert</h3>
        <p id="alertMsg"></p>
        <button class="auth-btn" onclick="this.parentElement.parentElement.style.display='none'">OK</button>
    </div>
</div>

<!-- Modal التعديل -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">Edit Entry ✏️</h3>
        <input type="text" id="editTitle" class="auth-input">
        <textarea id="editText" rows="5" class="auth-input"></textarea>

        <div style="text-align:left; margin-bottom:10px;">
            <label style="font-size:12px; font-weight:bold; color:var(--dark-blue)">Change Date</label>
            <input type="date" id="editDate" class="auth-input">
        </div>

        <div id="currentEditGallery" class="edit-media-preview"></div>

        <div class="file-upload-art" onclick="document.getElementById('editFile').click()">
            <span id="editFileLabel">Add New Media ➕</span>
            <input type="file" id="editFile" hidden onchange="handleNewEditFile()">
        </div>

        <button id="updateBtn" class="auth-btn" onclick="updateNote()">Save Changes</button>
        <button class="auth-btn" style="background:#eee; color:#333; margin-top:10px;" onclick="closeModal()">Cancel</button>
    </div>
</div>

<div id="lightbox" onclick="this.style.display='none'"></div>

<script>
    const SB_URL = "https://ixzuotmqgdnlrkalwyyg.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4enVvdG1xZ2RubHJrYWx3eXlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDAwMTQsImV4cCI6MjA5MTExNjAxNH0.NrU4rKVfrHWB0x220iIGzr-aXGm_5EljV4CCoYFnojo";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let currentView = 'active', rawData = [], currentUser = localStorage.getItem('mo_user'), editId = null, tempEditMedia = [];

    function showCustomAlert(t, m) { document.getElementById('alertTitle').innerText = t; document.getElementById('alertMsg').innerText = m; document.getElementById('alertModal').style.display = 'block'; }
    function setToday() { const n = new Date(); document.getElementById('noteDate').value = n.toISOString().split('T')[0]; document.getElementById('noteTime').value = n.toTimeString().slice(0,5); }
    function setMode(m) {
        document.getElementById('auth-title').innerText = m === 'login' ? "Mo's Vault 🔒" : "Join the Vault ✨";
        document.getElementById('auth-btn').innerText = m === 'login' ? 'Enter ✨' : 'Register ✨';
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+m).classList.add('active');
        window.authMode = m;
    }

    async function handleAuth() {
        const u = document.getElementById('auth-user').value, p = document.getElementById('auth-pass').value;
        if(!u || !p) return showCustomAlert("Wait", "Fill all fields!");
        if(window.authMode === 'register') {
            const { error } = await _supabase.from('journal_users').insert([{ username: u, password: p }]);
            if(error) showCustomAlert("Error", "Taken!"); else showCustomAlert("Success", "Login now!");
        } else {
            const { data } = await _supabase.from('journal_users').select('*').eq('username', u).eq('password', p).single();
            if(data) { localStorage.setItem('mo_user', u); location.reload(); } else showCustomAlert("Error", "Denied!");
        }
    }

    async function uploadFile(file) {
        if(!file) return null;
        const name = `${Date.now()}_${file.name}`;
        const { data, error } = await _supabase.storage.from('media').upload(name, file);
        return error ? null : _supabase.storage.from('media').getPublicUrl(name).data.publicUrl;
    }

    async function handleSave() {
        const content = document.getElementById('noteText').value;
        if(!content) return showCustomAlert("Empty", "Write something!");
        const btn = document.getElementById('mainSaveBtn');
        btn.disabled = true; btn.innerText = "Saving...";
        const file = document.getElementById('noteFile').files[0];
        const url = await uploadFile(file);
        const d = document.getElementById('noteDate').value, t = document.getElementById('noteTime').value;
        const reminder = d ? (t ? `${d}T${t}` : `${d}T00:00:00`) : null;
        await _supabase.from('notes').insert([{ title: document.getElementById('noteTitle').value || "Untitled", content, media_url: url, owner_name: currentUser, reminder_at: reminder, is_completed: false }]);
        location.reload();
    }

    async function fetchNotes() {
        const { data } = await _supabase.from('notes').select('*').eq('owner_name', currentUser).eq('is_completed', currentView === 'history').order('created_at', {ascending: false});
        rawData = data || [];
        renderStructure(rawData);
    }

    function renderStructure(notes) {
        const layout = document.getElementById('notesLayout'); layout.innerHTML = '';
        const groups = notes.reduce((acc, n) => {
            const d = n.reminder_at ? new Date(n.reminder_at) : new Date(n.created_at);
            const day = d.toLocaleDateString('en-US', {weekday:'long', day:'numeric', month:'long'});
            if(!acc[day]) acc[day] = []; acc[day].push(n); return acc;
        }, {});

        for (const day in groups) {
            const section = document.createElement('div');
            section.innerHTML = `<div class="day-header">${day}</div>`;
            const row = document.createElement('div'); row.className = 'journal-row';
            groups[day].forEach(n => {
                const card = document.createElement('div'); card.className = 'note-card';
                // معالجة تعدد الميديا
                const urls = n.media_url ? n.media_url.split('||') : [];
                let galleryHtml = '';
                if(urls.length > 0) {
                    galleryHtml = `<div class="media-gallery">`;
                    urls.forEach(u => {
                        if(u.match(/\.(mp4|webm|ogg)$/i)) galleryHtml += `<video src="${u}" class="gallery-item" onclick="zoom('${u}','v')"></video>`;
                        else galleryHtml += `<img src="${u}" class="gallery-item" onclick="zoom('${u}','i')">`;
                    });
                    galleryHtml += `</div>`;
                }
                card.innerHTML = `
                    <div class="card-actions">
                        <button class="action-btn" onclick="openEdit('${n.id}')">✏️</button>
                        <button class="action-btn" onclick="askDelete('${n.id}')">🗑️</button>
                    </div>
                    <div style="font-size:10px; opacity:0.5; margin-top:15px;">${n.reminder_at ? new Date(n.reminder_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : 'New'}</div>
                    <h3 style="margin:5px 0;">${n.title}</h3>
                    ${galleryHtml}
                    <p style="white-space: pre-wrap; flex-grow:1; font-size:14px;">${n.content}</p>
                    ${!n.is_completed ? `<button onclick="markDone('${n.id}')" style="background:var(--orange); border:none; color:white; padding:10px; border-radius:8px; width:100%; margin-top:10px; font-weight:bold;">Archive ✅</button>` : ''}
                `;
                row.appendChild(card);
            });
            section.appendChild(row); layout.appendChild(section);
        }
    }

    function openEdit(id) {
        const note = rawData.find(n => n.id === id);
        editId = id;
        tempEditMedia = note.media_url ? note.media_url.split('||') : [];
        document.getElementById('editTitle').value = note.title;
        document.getElementById('editText').value = note.content;
        document.getElementById('editDate').value = note.reminder_at ? note.reminder_at.split('T')[0] : '';
        renderEditGallery();
        document.getElementById('editModal').style.display = 'block';
    }

    function renderEditGallery() {
        const gallery = document.getElementById('currentEditGallery');
        gallery.innerHTML = '';
        tempEditMedia.forEach((u, index) => {
            const div = document.createElement('div'); div.className = 'preview-wrapper';
            const media = u.match(/\.(mp4|webm|ogg)$/i) ? `<video src="${u}"></video>` : `<img src="${u}">`;
            div.innerHTML = `${media}<button class="remove-media-btn" onclick="removeMedia(${index})">×</button>`;
            gallery.appendChild(div);
        });
    }

    function removeMedia(index) { tempEditMedia.splice(index, 1); renderEditGallery(); }

    async function handleNewEditFile() {
        const file = document.getElementById('editFile').files[0];
        if(!file) return;
        document.getElementById('editFileLabel').innerText = "Uploading...";
        const url = await uploadFile(file);
        if(url) { tempEditMedia.push(url); renderEditGallery(); }
        document.getElementById('editFileLabel').innerText = "Add New Media ➕";
    }

    async function updateNote() {
        const btn = document.getElementById('updateBtn'); btn.disabled = true; btn.innerText = "Saving...";
        const finalMediaStr = tempEditMedia.join('||');
        await _supabase.from('notes').update({
            title: document.getElementById('editTitle').value,
            content: document.getElementById('editText').value,
            media_url: finalMediaStr,
            reminder_at: document.getElementById('editDate').value ? `${document.getElementById('editDate').value}T00:00:00` : null
        }).eq('id', editId);
        location.reload();
    }

    function askDelete(id) { document.getElementById('confirmModal').style.display = 'block'; document.getElementById('finalDeleteBtn').onclick = async () => { await _supabase.from('notes').delete().eq('id', id); location.reload(); }; }
    function closeConfirm() { document.getElementById('confirmModal').style.display = 'none'; }
    async function markDone(id) { await _supabase.from('notes').update({is_completed: true}).eq('id', id); fetchNotes(); }
    function closeModal() { document.getElementById('editModal').style.display = 'none'; }
    function logout() { localStorage.clear(); location.reload(); }
    function zoom(u, t) { const lb = document.getElementById('lightbox'); lb.innerHTML = t==='v' ? `<video src="${u}" controls autoplay></video>` : `<img src="${u}">`; lb.style.display = 'flex'; }
    function changeView(v) { currentView = v; document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(v==='active'?'tabActive':'tabHistory').classList.add('active'); document.getElementById('entryForm').style.display = v==='history'?'none':'block'; fetchNotes(); }

    document.getElementById('fuzzySearch').oninput = function() {
        const term = this.value; if(!term) return renderStructure(rawData);
        const fuse = new Fuse(rawData, { keys: ['title', 'content'], threshold: 0.4 });
        renderStructure(fuse.search(term).map(r => r.item));
    };

    if(currentUser) {
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('journal-app').style.display = 'flex';
        document.getElementById('user-avatar-text').innerText = currentUser.charAt(0).toUpperCase();
        fetchNotes();
    } else { setMode('login'); }
</script>
</body>
</html>
